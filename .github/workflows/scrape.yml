name: Monitor utrudnien MPK Lodz

on:
  schedule:
    # Co 10 minut, w godz. ~5:00-23:00 czasu polskiego (przybliżenie w UTC,
    # żeby zapas obejmował zarówno czas letni jak i zimowy - patrz README.md).
    - cron: "*/10 4-21 * * *"
  workflow_dispatch: {}   # pozwala odpalić ręcznie z zakładki "Actions" w GitHubie

# Zapobiega nakładaniu się dwóch uruchomień, gdyby poprzednie się przeciągnęło
concurrency:
  group: mpk-monitor
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python run.py
